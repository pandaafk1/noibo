<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Nội Bộ - Hệ Thống Voucher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .view-section { display: none; }
        .view-section.active { display: block !important; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .panda-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .loading-overlay { position: fixed; inset: 0; background: #f8fafc; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-12 overflow-x-hidden">

    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-orange-200 border-t-orange-500 rounded-full animate-spin"></div>
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Đang tải dữ liệu Panda...</p>
    </div>

    <header class="bg-white/90 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <div class="panda-gradient p-2 rounded-xl shadow-lg flex items-center justify-center w-10 h-10">
                <i class="fa-solid fa-paw text-white text-lg"></i>
            </div>
            <h1 class="text-lg font-black text-slate-900 tracking-tighter leading-none">PANDA NỘI BỘ</h1>
        </div>
        <button id="btn-admin-access" onclick="toggleAdmin()" class="bg-slate-900 text-white px-5 py-2.5 rounded-full text-xs font-bold flex items-center gap-2 hover:bg-black transition-all active:scale-95">
            <i class="fa-solid fa-shield-check"></i> <span id="admin-btn-text">Quản trị</span>
        </button>
    </header>

    <main id="main-content" class="max-w-2xl mx-auto px-6 mt-8 opacity-0 transition-opacity duration-500">
        <div id="view-search" class="view-section active">
            <div class="text-center space-y-3 mb-10 mt-4">
                <span class="bg-orange-100 text-orange-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">Hệ thống Voucher</span>
                <h2 class="text-5xl font-black text-slate-900 tracking-tighter uppercase leading-none">Chào Panda!</h2>
                <p class="text-slate-400 text-sm font-medium">Nhập số điện thoại để kiểm tra ưu đãi</p>
            </div>
            <form id="form-staff-search" class="relative group">
                <input type="tel" id="search-phone" placeholder="Ví dụ: 0907128918" class="w-full bg-white border-2 border-slate-100 rounded-[2rem] py-7 px-8 text-2xl font-black focus:border-orange-500 outline-none shadow-xl" required>
                <button type="submit" class="w-full mt-6 panda-gradient text-white py-6 rounded-[2rem] font-black text-lg">TIẾP TỤC</button>
            </form>
        </div>

        <div id="view-details" class="view-section">
            <button onclick="goToView('view-search')" class="mb-4 text-xs font-bold text-slate-400"><i class="fa-solid fa-arrow-left"></i> Quay lại</button>
            <div class="bg-white rounded-[3rem] p-10 border border-slate-200 shadow-2xl">
                <h2 id="display-name" class="text-4xl font-black text-slate-900 mb-2">...</h2>
                <p id="display-phone" class="text-slate-400 font-bold mb-6"></p>
                <div id="voucher-list" class="space-y-4">
                    <div class="p-6 bg-orange-50 rounded-2xl border border-orange-100 flex justify-between items-center">
                        <div>
                            <h4 class="font-black text-orange-600">Voucher 40%</h4>
                            <p class="text-xs text-orange-400">Dành cho nhân viên</p>
                        </div>
                        <button class="bg-orange-500 text-white px-4 py-2 rounded-xl font-bold text-xs">KÍCH HOẠT</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-admin-login" class="view-section">
            <div class="text-center py-10">
                <h2 class="text-2xl font-black mb-6">XÁC THỰC ADMIN</h2>
                <input type="password" id="admin-pass" placeholder="Mật khẩu..." class="w-full p-4 border rounded-2xl mb-4 text-center">
                <button onclick="checkAdminPass()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">ĐĂNG NHẬP</button>
            </div>
        </div>

        <div id="view-admin-dashboard" class="view-section">
            <h2 class="text-2xl font-black mb-6 uppercase">Quản trị hệ thống</h2>
            <div class="bg-white p-6 rounded-2xl border border-slate-200">
                <p class="text-sm font-bold text-slate-500">Tổng nhân viên trong danh sách:</p>
                <p id="stat-total" class="text-4xl font-black text-orange-500">0</p>
            </div>
            <button onclick="loadData()" class="w-full mt-4 bg-orange-500 text-white py-4 rounded-2xl font-bold">LÀM MỚI DỮ LIỆU</button>
        </div>
    </main>

        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
        let employees = [];

        window.goToView = (viewId) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        };

            const current = document.querySelector('.view-section.active').id;
            if (current.startsWith('view-admin')) goToView('view-search');
            else goToView('view-admin-login');
        };
